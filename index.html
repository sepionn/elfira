<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Styles */
        body { background-color: #050505; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        
        /* Glassmorphism Effect for the Main Box */
        .glass-box {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Futuristic Gradient & Shine for Buttons */
        .btn-premium {
            background: linear-gradient(135deg, #2563eb, #9333ea);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.5);
            transform: translateY(-2px);
        }
        .btn-premium::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            transition: all 0.5s ease;
        }
        .btn-premium:hover::after {
            left: 100%;
        }

        /* Pulse Animation */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(147, 51, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0); }
        }
        .pulse-effect { animation: pulse 2s infinite; }

        /* Fade-in Animation */
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="relative min-h-screen flex items-center justify-center p-4">

    <div class="absolute top-0 left-0 w-full h-full z-0 overflow-hidden">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-blue-600 rounded-full opacity-10 blur-[100px]"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-purple-600 rounded-full opacity-10 blur-[100px]"></div>
    </div>

    <div class="relative z-10 glass-box max-w-[380px] w-full p-10 rounded-3xl text-center fade-in">
        
        <div class="mb-6 inline-flex p-4 rounded-full bg-neutral-900 border border-neutral-800 shadow-inner">
            <svg class="w-8 h-8 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>

        <h1 class="text-white text-2xl font-black uppercase tracking-tighter mb-4 leading-tight">
            EXCLUSIVE <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">ACCESS</span> GRANTED
        </h1>
        
        <p class="text-neutral-400 text-sm mb-10 leading-relaxed font-light">
            Click your preferred access method below. After clicking, please allow 1-3 minutes for secure connection protocol to complete.
        </p>

        <div class="flex flex-col gap-5">
            <button onclick="bukaLinkAcak()" class="btn-premium pulse-effect text-white font-bold py-4 rounded-xl uppercase text-xs tracking-widest active:scale-95 shadow-lg shadow-purple-900/30">
                Unlock Free Access
            </button>
            <button onclick="bukaLinkAcak()" class="btn-premium text-white font-bold py-4 rounded-xl uppercase text-xs tracking-widest active:scale-95 shadow-lg shadow-purple-900/30">
                VIP Premium Access
            </button>
        </div>

        <p class="text-neutral-600 text-[10px] mt-10 tracking-wide font-mono">
            SECURE PROTOCOL V2.1 // CONNECTION TIMEOUT: 3 MIN
        </p>
    </div>

    <script>
        function bukaLinkAcak() {
            // Tetap menggunakan 5 link yang Anda berikan
            const daftarLink = [
                "https://accumulaterehearsehealing.com/sqk9vkaf6s?key=6dcf14edeb4eac5f0b551a25c8fd4225",
                "https://accumulaterehearsehealing.com/j7rw6gwd2?key=746de338fa3ba51457f4b310ba18133a",
                "https://accumulaterehearsehealing.com/i2si276z?key=1dae8a5ad23c25f47fc3b7153e7bfa76",
                "https://accumulaterehearsehealing.com/ktv637zckr?key=50239bba755d7020dc7b4bcae3d95b8c",
                "https://accumulaterehearsehealing.com/azp1hmn84z?key=8ea49793c761f98204fa8492866fe007"
            ];

            const acak = Math.floor(Math.random() * daftarLink.length);
            const linkTerpilih = daftarLink[acak];
            
            window.location.href = linkTerpilih;
        }
    </script>

</body>
</html>
