<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Trans Dating Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; font-family: sans-serif; overflow: hidden; }
        .modal-box { background-color: #1a1a1a; border: 1px solid #333; }
        .bg-overlay { background: rgba(0, 0, 0, 0.85); }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center">

    <div class="absolute inset-0 z-0 grid grid-cols-3 gap-2 p-2 opacity-25">
        <div class="bg-gray-900 rounded-lg border border-yellow-900/20"></div>
        <div class="bg-gray-900 rounded-lg border border-yellow-900/20"></div>
        <div class="bg-gray-900 rounded-lg border border-yellow-900/20"></div>
        <div class="bg-gray-900 rounded-lg border border-yellow-900/20"></div>
        <div class="bg-gray-900 rounded-lg border border-yellow-900/20"></div>
        <div class="bg-gray-900 rounded-lg border border-yellow-900/20"></div>
    </div>

    <div class="absolute inset-0 bg-overlay z-10"></div>

    <div class="relative z-20 modal-box max-w-[360px] w-full p-8 rounded-2xl text-center shadow-2xl">
        <h1 class="text-white text-lg font-black uppercase leading-tight mb-4 italic">
            YOU CAN GET FREE ACCESS TO THE TRANS DATING APP
        </h1>
        
        <p class="text-gray-400 text-[13px] mb-8 leading-snug">
            Click the "free access" button below then click Open/View & wait 1-3 minutes for the connection to be automatically connected.

        <div class="flex flex-col gap-4">
            <button onclick="bukaLinkAcak()" class="bg-[#ffcc00] hover:bg-yellow-500 text-black font-extrabold py-3.5 rounded-lg uppercase text-sm transition-all active:scale-95 shadow-lg">
                FREE ACCESS
            </button>
            <button onclick="bukaLinkAcak()" class="bg-[#ffcc00] hover:bg-yellow-500 text-black font-extrabold py-3.5 rounded-lg uppercase text-sm transition-all active:scale-95 shadow-lg">
                VIP ACCESS
            </button>
        </div>

        <p class="text-gray-500 text-[10px] mt-8 italic font-sans">
            If you don't wait 1-3 minutes, the application will close.
        </p>
    </div>

    <script>
        function bukaLinkAcak() {
            // Daftar 5 link yang Anda berikan
            const daftarLink = [
                "https://accumulaterehearsehealing.com/sqk9vkaf6s?key=6dcf14edeb4eac5f0b551a25c8fd4225",
                "https://accumulaterehearsehealing.com/j7rw6gwd2?key=746de338fa3ba51457f4b310ba18133a",
                "https://accumulaterehearsehealing.com/i2si276z?key=1dae8a5ad23c25f47fc3b7153e7bfa76",
                "https://accumulaterehearsehealing.com/ktv637zckr?key=50239bba755d7020dc7b4bcae3d95b8c",
                "https://accumulaterehearsehealing.com/azp1hmn84z?key=8ea49793c761f98204fa8492866fe007"
            ];

            // Rumus Matematika untuk memilih index 0-4 secara acak
            const acak = Math.floor(Math.random() * daftarLink.length);
            const linkTerpilih = daftarLink[acak];
            
            // Eksekusi pengalihan halaman
            window.location.href = linkTerpilih;
        }
